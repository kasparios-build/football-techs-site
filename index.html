<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Football Techs</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="logo">Football Techs</div>
    <nav>
      <a href="#">NFL</a>
      <a href="#">College</a>
      <a href="#">Draft</a>
      <a href="#">Analysis</a>

  <section class="hero">

  <section class="section">
    <h2>Latest College Football News</h2>

      <div class="card">
        <h3>Loading...</h3>

      </div>
    </div>

    © 2026 Football Techs
  </footer>
